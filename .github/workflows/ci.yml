name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syncboard
          POSTGRES_PASSWORD: syncboard
          POSTGRES_DB: syncboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U syncboard -d syncboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://syncboard:syncboard@localhost:5432/syncboard?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-change-before-production
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Check formatting
        run: npm run format:check

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: npm run test

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend formatting
        run: npm run format:check

      - name: Build frontend
        run: npm run build
