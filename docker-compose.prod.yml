services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://syncboard:syncboard@postgres:5432/syncboard?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: replace-this-with-a-long-production-secret
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "./node_modules/.bin/prisma migrate deploy && node dist/server.js"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/health/ready'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: syncboard
      POSTGRES_PASSWORD: syncboard
      POSTGRES_DB: syncboard
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncboard -d syncboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-prod-data:
  redis-prod-data:
